name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to Settings → Connectors
        2. Click Connect & Detect
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: wp-version
    attributes:
      label: WordPress Version
      placeholder: "7.0"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3"
    validations:
      required: true
  - type: dropdown
    id: endpoint-type
    attributes:
      label: Azure Endpoint Type
      options:
        - Azure AI Services (*.services.ai.azure.com)
        - Azure OpenAI (*.openai.azure.com)
        - Cognitive Services (*.cognitiveservices.azure.com)
        - Other / Not sure
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or debug log output.
    validations:
      required: false
